version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: xiayue
      POSTGRES_PASSWORD: xiayue
      POSTGRES_DB: xiayue
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

volumes:
  pgdata:
